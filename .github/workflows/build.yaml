name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  build_and_test:
    name: "Build & UTs: JDK ${{ matrix.Java }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ '8', '11', '17' ]
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: ${{ matrix.java }}
    - name: Build and run unit tests with Maven
      run:  mvn --batch-mode -Dspotbugs.skip=true test

  integration_test:
    name: "ITs: JDK ${{ matrix.Java }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ '8', '11', '17' ]
    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: ${{ matrix.java }}

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name:  Build IT image
      working-directory: bmq-sdk/src/test/docker
      run: docker build --tag bmq-broker-java-it --build-arg "image=ghcr.io/bloomberg/blazingmq:latest" .

    - name: Build and run integration tests with Maven
      timeout-minutes: 120
      run: mvn --batch-mode -DskipUnitTests=true -Dspotbugs.skip=true -Dit.dockerImage=bmq-broker-java-it:latest verify

    - name: Compress collected broker logs
      if: failure()
      working-directory: /tmp/bmq-broker
      run: tar -zcvf broker_logs.tar.gz /tmp/bmq-broker/bmq-broker-java-it*

    - name: Upload broker logs as artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: broker_logs_${{ matrix.java }}
        path: /tmp/bmq-broker/broker_logs.tar.gz
        retention-days: 5
